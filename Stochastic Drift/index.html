<!DOCTYPE html>

<html lang="en">

<head>

    <script>

        // Tab-Session Lock: Prevents the intro from replaying when navigating back from credits locally.

        // It plays once when you open the file, but skips if you navigate within the same tab.

        try {

            if (window.name === 'StochasticDriftActive') {

                document.documentElement.classList.add('skip-intro');

            } else {

                window.name = 'StochasticDriftActive';

            }

        } catch(e) {}

    </script>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Stochastic Drift</title>

    <style>

        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');



        :root {

            --bg-dark: #060820;

            --bg-light: #0a0f28;

            --accent: #7fff8c;

            --text-main: #ffffff;

            --text-dim: rgba(255, 255, 255, 0.6);

            --font-display: 'Orbitron', sans-serif;

            --font-ui: 'Rajdhani', sans-serif;

        }



        * {

            box-sizing: border-box;

            margin: 0;

            padding: 0;

        }



        body, html {

            width: 100vw;

            height: 100vh;

            overflow: hidden;

            background: linear-gradient(160deg, var(--bg-dark) 0%, var(--bg-light) 50%, #06081a 100%);

            font-family: var(--font-ui);

            color: var(--text-main);

            user-select: none;

        }



        /* --- BACKGROUND VFX --- */

        #noise-overlay {

            position: fixed;

            top: 0; left: 0; width: 100%; height: 100%;

            pointer-events: none;

            z-index: 100;

            opacity: 0.04;

            background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');

        }



        .perspective-grid {

            position: absolute;

            bottom: -50%; left: -50%;

            width: 200%; height: 150%;

            background-image: 

                linear-gradient(rgba(127, 255, 140, 0.1) 1px, transparent 1px),

                linear-gradient(90deg, rgba(127, 255, 140, 0.1) 1px, transparent 1px);

            background-size: 50px 50px;

            transform: perspective(600px) rotateX(75deg);

            animation: gridMove 5s linear infinite;

            z-index: 0;

            opacity: 0.3;

        }



        @keyframes gridMove {

            0% { transform: perspective(600px) rotateX(75deg) translateY(0); }

            100% { transform: perspective(600px) rotateX(75deg) translateY(50px); }

        }



        .floating-math {

            position: absolute;

            top: 0; left: 0; width: 100%; height: 100%;

            pointer-events: none;

            z-index: 1;

            overflow: hidden;

        }



        .math-symbol {

            position: absolute;

            color: var(--accent);

            opacity: 0.1;

            font-family: serif;

            font-size: 2rem;

            animation: floatUp linear infinite;

        }



        @keyframes floatUp {

            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }

            10% { opacity: 0.15; }

            90% { opacity: 0.15; }

            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }

        }



        /* --- GIANT EQUATION --- */

        .giant-equation {

            position: absolute;

            top: 50%; left: 50%;

            transform: translate(-50%, -50%);

            width: 90%;

            text-align: center;

            font-size: 8vw;

            font-family: "Times New Roman", serif;

            font-style: italic;

            color: rgba(255, 255, 255, 0.05);

            z-index: 2;

            pointer-events: none;

            letter-spacing: -0.02em;

        }



        .giant-equation .mu { animation: pulseOpacity 4s infinite alternate; }

        .giant-equation .sigma { color: rgba(127, 255, 140, 0.15); text-shadow: 0 0 20px rgba(127, 255, 140, 0.5); animation: electricFlicker 2s infinite; }

        .giant-equation .dw { animation: erraticFlicker 0.5s infinite; }



        @keyframes pulseOpacity { 0% { opacity: 0.3; } 100% { opacity: 1; } }

        @keyframes electricFlicker { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; text-shadow: none; } 51% { opacity: 1; text-shadow: 0 0 30px var(--accent); } }

        @keyframes erraticFlicker { 0% { opacity: 1; } 20% { opacity: 0.1; } 40% { opacity: 0.8; } 60% { opacity: 0.3; } 80% { opacity: 0.9; } 100% { opacity: 0.5; } }



        /* --- MAIN UI --- */

        .ui-container {

            position: relative;

            z-index: 10;

            display: flex;

            flex-direction: column;

            align-items: center;

            justify-content: center;

            height: 100vh;

        }



        .title {

            font-family: var(--font-display);

            font-size: 5rem;

            font-weight: 900;

            color: #fff;

            text-shadow: 0 0 10px rgba(255,255,255,0.5), 0 0 20px var(--accent), 0 0 40px var(--accent);

            letter-spacing: 0.1em;

            position: relative;

            animation: glitch-skew 3s infinite linear alternate-reverse;

        }



        .title::before, .title::after {

            content: attr(data-text);

            position: absolute;

            top: 0; left: 0;

            width: 100%; height: 100%;

            background: transparent;

        }



        .title::before {

            left: 2px;

            text-shadow: -2px 0 #ff00c1;

            clip: rect(44px, 450px, 56px, 0);

            animation: glitch-anim 5s infinite linear alternate-reverse;

        }



        .title::after {

            left: -2px;

            text-shadow: -2px 0 var(--accent);

            clip: rect(44px, 450px, 56px, 0);

            animation: glitch-anim2 5s infinite linear alternate-reverse;

        }



        @keyframes glitch-anim { 0% { clip: rect(10px, 9999px, 31px, 0); } 20% { clip: rect(62px, 9999px, 12px, 0); } 40% { clip: rect(31px, 9999px, 83px, 0); } 60% { clip: rect(82px, 9999px, 2px, 0); } 80% { clip: rect(18px, 9999px, 94px, 0); } 100% { clip: rect(48px, 9999px, 34px, 0); } }

        @keyframes glitch-anim2 { 0% { clip: rect(65px, 9999px, 100px, 0); } 20% { clip: rect(3px, 9999px, 54px, 0); } 40% { clip: rect(89px, 9999px, 20px, 0); } 60% { clip: rect(22px, 9999px, 76px, 0); } 80% { clip: rect(63px, 9999px, 11px, 0); } 100% { clip: rect(33px, 9999px, 92px, 0); } }

        @keyframes glitch-skew { 0% { transform: skew(0deg); } 90% { transform: skew(0deg); } 91% { transform: skew(2deg); } 92% { transform: skew(-2deg); } 93% { transform: skew(0deg); } 100% { transform: skew(0deg); } }



        .tagline {

            font-size: 1.2rem;

            color: var(--accent);

            letter-spacing: 0.5em;

            margin-top: -10px;

            margin-bottom: 50px;

            text-transform: uppercase;

            animation: waveFade 4s ease-in-out infinite;

        }



        @keyframes waveFade { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; text-shadow: 0 0 15px var(--accent); } }



        /* --- MENU --- */

        .menu {

            display: flex;

            flex-direction: column;

            align-items: center;

            gap: 15px;

            list-style: none;

        }



        .menu-btn {

            background: transparent;

            border: 1px solid rgba(127, 255, 140, 0.2);

            color: var(--text-dim);

            font-family: var(--font-display);

            font-size: 1.2rem;

            padding: 10px 40px;

            cursor: pointer;

            transition: all 0.3s ease;

            text-transform: uppercase;

            letter-spacing: 0.1em;

            position: relative;

            overflow: hidden;

            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);

        }



        .menu-btn.primary {

            font-size: 1.8rem;

            padding: 15px 60px;

            color: var(--accent);

            border-color: var(--accent);

            background: rgba(127, 255, 140, 0.05);

            box-shadow: 0 0 15px rgba(127, 255, 140, 0.1) inset;

        }



        .menu-btn::before {

            content: '';

            position: absolute;

            top: 0; left: -100%; width: 100%; height: 100%;

            background: linear-gradient(90deg, transparent, rgba(127,255,140,0.4), transparent);

            transition: all 0.4s ease;

        }



        .menu-btn:hover {

            color: #fff;

            border-color: var(--accent);

            box-shadow: 0 0 20px rgba(127, 255, 140, 0.5), inset 0 0 10px rgba(127, 255, 140, 0.3);

            text-shadow: 0 0 8px var(--accent);

        }



        .menu-btn:hover::before {

            left: 100%;

        }



        .menu-desc {

            height: 20px;

            margin-top: 15px;

            color: var(--text-dim);

            font-size: 0.9rem;

            letter-spacing: 0.05em;

            transition: opacity 0.3s ease;

            opacity: 0;

        }



        .menu:hover .menu-desc { opacity: 1; }



        /* --- BOTTOM PANELS --- */

        .bottom-panel {

            position: absolute;

            bottom: 30px;

            z-index: 10;

            background: rgba(6, 8, 32, 0.7);

            border: 1px solid rgba(127, 255, 140, 0.1);

            backdrop-filter: blur(10px);

            padding: 15px;

            border-radius: 4px;

        }



        /* LIVE SIMULATION (Left) */

        .panel-left {

            left: 30px;

            width: 300px;

            height: 200px;

        }



        .panel-title {

            font-family: var(--font-display);

            font-size: 0.8rem;

            color: var(--accent);

            margin-bottom: 10px;

            letter-spacing: 0.1em;

            display: flex;

            justify-content: space-between;

        }

        

        .panel-title span { font-size: 0.7rem; color: var(--text-dim); }



        #gbm-canvas {

            width: 100%;

            height: calc(100% - 25px);

            border-bottom: 1px solid rgba(255,255,255,0.1);

            border-left: 1px solid rgba(255,255,255,0.1);

        }



        /* CONCEPT DISCOVERY (Right) */

        .panel-right {

            right: 30px;

            width: 320px;

        }



        .concept-list {

            display: flex;

            flex-direction: column;

            gap: 8px;

        }



        .concept-item {

            display: flex;

            align-items: center;

            font-size: 0.8rem;

            color: var(--text-dim);

        }



        .concept-icon {

            width: 15px; height: 15px;

            margin-right: 10px;

            fill: none;

            stroke: var(--text-dim);

            stroke-width: 2;

            stroke-linecap: round;

            stroke-linejoin: round;

        }



        .concept-name { width: 130px; }



        .progress-bar {

            flex-grow: 1;

            height: 4px;

            background: rgba(255,255,255,0.1);

            position: relative;

            overflow: hidden;

        }



        .progress-fill {

            position: absolute;

            top: 0; left: 0; height: 100%;

            background: var(--accent);

            box-shadow: 0 0 5px var(--accent);

            width: 0%; /* Dynamic */

        }

        

        .concept-item.unlocked { color: #fff; }

        .concept-item.unlocked .concept-icon { stroke: var(--accent); }



        /* ============================================================ */

        /* CINEMATIC STUDIO INTRO — plays once ever, then never again    */

        /* ============================================================ */

        html.skip-intro #cinematic-intro { display: none !important; }

        html.skip-intro #main-content-wrapper { opacity: 1 !important; transition: none !important; }



        #cinematic-intro {

            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;

            background: #000; z-index: 1000; overflow: hidden;

            opacity: 1; transition: opacity 1.4s ease;

        }

        #cinematic-intro.intro-fading { opacity: 0; pointer-events: none; }

        #cinema-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; }



        #main-content-wrapper { opacity: 0; transition: opacity 1.8s ease; }

        #main-content-wrapper.revealed { opacity: 1; }



        .intro-title-layer {

            position: absolute; top: 0; left: 0; width: 100%; height: 100%;

            display: flex; align-items: center; justify-content: center;

            pointer-events: none; perspective: 900px;

        }



        /* --- Scene 2: clean, simple, minimal studio card (matches a restrained publisher-card style) --- */

        #card-presents {

            font-family: var(--font-display); text-align: center; letter-spacing: 0.1em;

            font-size: clamp(1.4rem, 3.4vw, 2.4rem); font-weight: 500;

            color: rgba(235, 240, 250, 0.95);

            text-shadow: 0 0 18px rgba(180, 210, 255, 0.4);

            opacity: 0; transform: scale(0.97);

            transition: opacity 1.3s ease, transform 1.3s ease;

        }

        #card-presents.card-in { opacity: 1; transform: scale(1); }

        #card-presents.card-out { opacity: 0; transition: opacity 0.9s ease; }



        /* --- Scene 3: grand metallic title-logo reveal --- */

        #card-title {

            font-family: var(--font-display); text-align: center; letter-spacing: 0.06em;

            font-size: clamp(2.6rem, 8vw, 6.4rem); font-weight: 900;

            background: linear-gradient(180deg, #ffffff 0%, #d8f5e0 18%, #9fe8b8 38%, #ffffff 55%, #bfe9ff 72%, #ffffff 100%);

            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent;

            opacity: 0; transform: scale(0.5);

            filter: blur(8px) brightness(2.2) drop-shadow(0 0 0px rgba(127,255,140,0));

        }

        #card-title.title-reveal { animation: titleGrandReveal 1.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        #card-title.title-charge { animation: titleCharge 2.3s ease-in forwards; }



        /* Shattering Letters Class */

        .shatter-letter {

            display: inline-block;

            transition: transform 1.5s cubic-bezier(0.1, 0.9, 0.2, 1), opacity 1.2s ease-in, filter 1.2s ease-in;

        }



        @keyframes titleGrandReveal {

            0%   { opacity: 0; transform: scale(1); filter: blur(14px) brightness(3) drop-shadow(0 0 0px rgba(127,255,140,0)); }
            100% { opacity: 1; transform: scale(1); filter: blur(0px) brightness(1.05) drop-shadow(0 0 22px rgba(127,255,140,0.45)); }

        }

        @keyframes titleCharge {
            0%   { opacity: 1; transform: scale(1); filter: blur(0px) brightness(1.05) drop-shadow(0 0 22px rgba(127,255,140,0.45)); }
            100% { opacity: 1; transform: scale(1); filter: blur(0px) brightness(1.5) drop-shadow(0 0 70px rgba(127,255,140,0.85)); }
        }

        .intro-flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--accent); /* Swapped from #fff to the thematic green */
            mix-blend-mode: overlay; /* Blends dynamically with the dark background */
            opacity: 0; pointer-events: none; z-index: 100;
        }

        .intro-shockwave {

            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border-radius: 50%;

            transform: translate(-50%, -50%); pointer-events: none;

            border: 2px solid rgba(190, 255, 210, 0.9);

            box-shadow: 0 0 40px 10px rgba(150, 255, 190, 0.5);

            opacity: 0;

        }

        @keyframes shockwaveExpand {

            0%   { width: 10px; height: 10px; opacity: 1; border-width: 6px; }

            100% { width: 220vw; height: 220vw; opacity: 0; border-width: 0px; }

        }

        .intro-shockwave.go { animation: shockwaveExpand 1.1s cubic-bezier(0.1, 0.6, 0.3, 1) forwards; }



        #intro-skip-btn {

            position: absolute; bottom: 36px; right: 36px; z-index: 20;

            background: rgba(10, 14, 30, 0.55); border: 1px solid rgba(255,255,255,0.3);

            color: rgba(255,255,255,0.85); font-family: var(--font-ui); font-size: 0.85rem;

            letter-spacing: 0.12em; text-transform: uppercase; padding: 10px 22px;

            border-radius: 22px; cursor: pointer; opacity: 0; transition: opacity 0.6s ease, background 0.2s, border-color 0.2s;

            backdrop-filter: blur(4px);

        }

        #intro-skip-btn.show { opacity: 1; }

        #intro-skip-btn:hover { background: rgba(127,255,140,0.15); border-color: var(--accent); color: #fff; }

    </style>

</head>

<body>

    <div id="cinematic-intro">

        <canvas id="cinema-canvas"></canvas>

        <div class="intro-flash" id="intro-flash"></div>

        <div class="intro-shockwave" id="intro-shockwave"></div>



        <div class="intro-title-layer">

            <div id="card-presents">DeShrimpo Games Presents</div>

        </div>

        <div class="intro-title-layer">

            <div id="card-title">STOCHASTIC DRIFT</div>

        </div>


        <button id="intro-skip-btn" onclick="skipIntro()">Skip Intro &rsaquo;&rsaquo;</button>


        <video id="intro-audio" preload="auto" style="display:none;" playsinline>

            <source src="DeShrimpo Opening.mov" type="video/quicktime">

            <source src="DeShrimpo Opening.mov" type="video/mp4">

        </video>

    </div>



    <script>

        if (document.documentElement.classList.contains('skip-intro')) {

            document.getElementById('cinematic-intro').remove();

            document.getElementById('main-content-wrapper').classList.add('revealed');

        } else {

    (function() {

        const canvas = document.getElementById('cinema-canvas');

        const ctx = canvas.getContext('2d');

        let W, H;

        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }

        window.addEventListener('resize', resize); resize();



        // --- Starfield ---

        const stars = [];

        const NUM_STARS = 220;

        const HUES = ['white', 'white', 'white', 'gold', 'cyan', 'violet', 'pink'];

        for (let i = 0; i < NUM_STARS; i++) {

            stars.push({

                x: Math.random()*W, y: Math.random()*H,

                r: Math.random()*1.6 + 0.4,

                tw: Math.random()*Math.PI*2, twSpeed: 0.02 + Math.random()*0.04,

                vx: (Math.random()-0.5)*0.15, vy: (Math.random()-0.5)*0.15,

                hue: HUES[Math.floor(Math.random()*HUES.length)]

            });

        }

        function starColor(hue, a) {

            const map = { white: '255,255,255', gold: '255,221,140', cyan: '140,230,255', violet: '200,160,255', pink: '255,170,210' };

            return `rgba(${map[hue]},${a})`;

        }



        // --- Nebula blobs ---

        const nebulaBlobs = [

            { x: 0.30, y: 0.40, r: 0.50, color: '255,215,140', phase: 0 },

            { x: 0.70, y: 0.30, r: 0.45, color: '140,180,255', phase: 2 },

            { x: 0.50, y: 0.70, r: 0.55, color: '190,140,255', phase: 4 },

            { x: 0.25, y: 0.65, r: 0.40, color: '140,255,230', phase: 1 }

        ];



        // --- Floating energy ribbons ---

        const ribbons = [

            { y: 0.35, amp: 60, freq: 0.004, speed: 0.00018, color: '180,210,255', phase: 0 },

            { y: 0.62, amp: 45, freq: 0.005, speed: -0.00014, color: '230,190,255', phase: 2.4 },

            { y: 0.50, amp: 35, freq: 0.006, speed: 0.0002, color: '255,225,180', phase: 4.1 }

        ];



        let burstParticles = [];

        function spawnBurst(count, opts) {

            opts = opts || {};

            for (let i = 0; i < count; i++) {

                let ang = Math.random()*Math.PI*2;

                let speed = (opts.speedMin||2) + Math.random()*(opts.speedRange||6);

                burstParticles.push({

                    x: W/2, y: H/2,

                    vx: Math.cos(ang)*speed, vy: Math.sin(ang)*speed,

                    life: 0, maxLife: opts.life || 80,

                    size: (opts.sizeMin||1) + Math.random()*(opts.sizeRange||3),

                    color: opts.color || '255,255,255'

                });

            }

        }



        let convergeActive = false, convergeT0 = 0, convergeDuration = 1000;

        function convergeStars(durationMs) { convergeActive = true; convergeT0 = performance.now(); convergeDuration = durationMs; }



        let shakeUntil = 0;

        let startTime = null;



        let cosmicIntensity = 0, intensityFrom = 0, intensityTo = 0, intensityT0 = 0, intensityDur = 1000;

        function fadeIntensity(target, durationMs) {

            intensityFrom = cosmicIntensity; intensityTo = target;

            intensityT0 = performance.now(); intensityDur = durationMs;

        }



        function render(now) {

            if (!startTime) startTime = now;

            const t = now - startTime;



            let ip = Math.min(1, (now - intensityT0) / intensityDur);

            ip = ip*ip*(3-2*ip);

            cosmicIntensity = intensityFrom + (intensityTo - intensityFrom)*ip;



            ctx.save();

            if (now < shakeUntil) {

                let intensity = 10 * ((shakeUntil - now) / 350);

                ctx.translate((Math.random()-0.5)*intensity, (Math.random()-0.5)*intensity);

            }



            let bgGrad = ctx.createRadialGradient(W/2, H*0.45, 0, W/2, H*0.45, Math.max(W,H)*0.85);

            bgGrad.addColorStop(0, 'rgba(18,20,42,1)');

            bgGrad.addColorStop(1, 'rgba(2,2,8,1)');

            ctx.fillStyle = bgGrad;

            ctx.fillRect(-50, -50, W+100, H+100);



            ctx.globalCompositeOperation = 'lighter';



            nebulaBlobs.forEach(b => {

                let cx = b.x*W + Math.sin(t*0.00012 + b.phase)*W*0.05;

                let cy = b.y*H + Math.cos(t*0.0001 + b.phase)*H*0.05;

                let r = b.r * Math.max(W,H) * (0.8 + Math.sin(t*0.0003 + b.phase)*0.1);

                let grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);

                grad.addColorStop(0, `rgba(${b.color},${0.16*cosmicIntensity})`);

                grad.addColorStop(1, `rgba(${b.color},0)`);

                ctx.fillStyle = grad;

                ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();

            });



            ribbons.forEach(r => {

                ctx.beginPath();

                for (let x = -20; x <= W+20; x += 20) {

                    let y = r.y*H + Math.sin(x*r.freq + t*r.speed*10 + r.phase)*r.amp;

                    if (x === -20) ctx.moveTo(x, y); else ctx.lineTo(x, y);

                }

                ctx.strokeStyle = `rgba(${r.color},${0.12*cosmicIntensity})`;

                ctx.lineWidth = 3;

                ctx.stroke();

            });



            let convergeProgress = convergeActive ? Math.min(1, (now - convergeT0) / convergeDuration) : 0;

            stars.forEach(s => {

                s.x += s.vx; s.y += s.vy;

                if (s.x < -10) s.x = W+10; if (s.x > W+10) s.x = -10;

                if (s.y < -10) s.y = H+10; if (s.y > H+10) s.y = -10;

                s.tw += s.twSpeed;

                let alpha = (0.4 + Math.sin(s.tw)*0.4) * cosmicIntensity;



                let px = s.x, py = s.y;

                if (convergeActive) {

                    let ease = convergeProgress*convergeProgress*(3-2*convergeProgress);

                    px = s.x + (W/2 - s.x)*ease;

                    py = s.y + (H/2 - s.y)*ease;

                    alpha *= (1 - ease*0.7);

                }

                ctx.beginPath(); ctx.arc(px, py, s.r, 0, Math.PI*2);

                ctx.fillStyle = starColor(s.hue, alpha);

                ctx.fill();

            });



            for (let i = burstParticles.length-1; i >= 0; i--) {

                let p = burstParticles[i];

                p.x += p.vx; p.y += p.vy; p.vx *= 0.98; p.vy *= 0.98; p.life++;

                let a = 1 - p.life/p.maxLife;

                if (a <= 0) { burstParticles.splice(i, 1); continue; }

                ctx.beginPath(); ctx.arc(p.x, p.y, p.size*a + 0.3, 0, Math.PI*2);

                ctx.fillStyle = `rgba(${p.color},${a})`;

                ctx.fill();

            }



            let flareX = W*0.5 + Math.sin(t*0.0002)*W*0.28;

            let flareY = H*0.4 + Math.cos(t*0.00017)*H*0.22;

            let flareGrad = ctx.createRadialGradient(flareX, flareY, 0, flareX, flareY, 140);

            flareGrad.addColorStop(0, 'rgba(255,255,255,0.5)');

            flareGrad.addColorStop(0.4, 'rgba(200,220,255,0.15)');

            flareGrad.addColorStop(1, 'rgba(200,220,255,0)');

            ctx.fillStyle = flareGrad;

            ctx.beginPath(); ctx.arc(flareX, flareY, 140, 0, Math.PI*2); ctx.fill();



            ctx.save();

            ctx.translate(flareX, flareY);

            ctx.strokeStyle = 'rgba(255,255,255,0.22)'; ctx.lineWidth = 1;

            for (let i = 0; i < 4; i++) {

                let ang = (i/4)*Math.PI*2 + t*0.0001;

                ctx.beginPath();

                ctx.moveTo(Math.cos(ang)*8, Math.sin(ang)*8);

                ctx.lineTo(Math.cos(ang)*220, Math.sin(ang)*220);

                ctx.stroke();

            }

            ctx.restore();



            ctx.globalCompositeOperation = 'source-over';

            ctx.restore();



            requestAnimationFrame(render);

        }

        requestAnimationFrame(render);



        // Dynamic Span Wrapping for Shatter Effect

        const titleEl = document.getElementById('card-title');

        const titleText = titleEl.innerText;

        titleEl.innerHTML = '';

        for(let char of titleText) {

        // --- Scene timeline (19s total) ---

        let finished = false;

        const timers = [];

        function at(ms, fn) { timers.push(setTimeout(fn, ms)); }



        const introAudio = document.getElementById('intro-audio');

                    window.addEventListener('keydown', resume, { once: true });

                });

            } catch(e) {}

        }

        tryPlayAudio();

        // SHATTER DETONATION
at(15300, () => {

	function finishIntro() {
            if (finished) return;
            finished = true;
            timers.forEach(clearTimeout);
            document.getElementById('cinematic-intro').classList.add('intro-fading');
            document.getElementById('main-content-wrapper').classList.add('revealed');
            try { introAudio.pause(); } catch(e) {}
            setTimeout(() => { const el = document.getElementById('cinematic-intro'); if (el) el.remove(); }, 1500);

            // --- ADDED: FADE IN THEME MUSIC ---
            const theme = document.getElementById('theme-audio');
            if (theme) {
                let vol = 0;
                let fade = setInterval(() => {
                    if (vol < 0.9) { 
                        vol += 0.05; 
                        theme.volume = vol; 
                    } else { 
                        theme.volume = 1;
                        clearInterval(fade); 
                    }
                }, 100);
            }
        }

        // Restoring the deleted Skip button logic
        window.skipIntro = finishIntro;
    })();
    }

    // --- GLOBAL AUDIO CONTROLLER ---
    // Moved OUTSIDE the intro block so it always works
    const themeAudio = document.getElementById('theme-audio');
    const selectAudio = document.getElementById('select-audio');

    // 1. Background Music Continuity
    const savedTime = sessionStorage.getItem('stochastic_theme_time');
    
    // If the intro is skipped (user navigated back), play music immediately
    if (document.documentElement.classList.contains('skip-intro')) {
        if (savedTime !== null) themeAudio.currentTime = parseFloat(savedTime);
        themeAudio.volume = 1;
        themeAudio.play().catch(() => {
            window.addEventListener('click', () => themeAudio.play(), { once: true });
        });
    } else {
        // If intro is playing, start music muted in the background to sync it up, 
        // it will be faded in when the intro finishes.
        themeAudio.volume = 0;
        themeAudio.play().catch(()=>{});
    }

    // Save timestamp before leaving the page
    window.addEventListener('beforeunload', () => {
        sessionStorage.setItem('stochastic_theme_time', themeAudio.currentTime);
    });

    // 2. Button Select SFX
    document.querySelectorAll('button, .menu-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            selectAudio.currentTime = 0; // Reset to allow rapid clicking
            selectAudio.play().catch(()=>{});
        });
    });

    <script>

        // --- 1. FLOATING MATH SYMBOLS ---

        const mathContainer = document.getElementById('math-container');

        const symbols = ['μ', 'σ', 'dW', '∫', '∂', 'λ', 'Δ', 'θ', 'Ω', '∇'];

        

        function spawnSymbol() {

            const span = document.createElement('span');

            span.className = 'math-symbol';

            span.innerText = symbols[Math.floor(Math.random() * symbols.length)];

            span.style.left = Math.random() * 100 + 'vw';

            span.style.animationDuration = (Math.random() * 10 + 10) + 's';

            span.style.fontSize = (Math.random() * 2 + 1) + 'rem';

            mathContainer.appendChild(span);



            setTimeout(() => span.remove(), 20000); // Cleanup

        }

        setInterval(spawnSymbol, 800);

        for(let i=0; i<15; i++) spawnSymbol(); // Initial population



        // --- 2. MENU HOVER DESCRIPTIONS ---

        const buttons = document.querySelectorAll('.menu-btn');

        const descText = document.getElementById('menu-desc-text');



        buttons.forEach(btn => {

            btn.addEventListener('mouseenter', () => {

                descText.innerText = btn.getAttribute('data-desc');

            });

            btn.addEventListener('mouseleave', () => {

                descText.innerText = "Awaiting input...";

            });

        });



        // --- 3. BOTTOM RIGHT PROGRESS PANEL ---

            function isNodeUnlocked(id) {

                    if (id === 'prob') return true; // Probability is always unlocked

                    return localStorage.getItem('vault_unlocked_' + id) === 'true';

         }



            const growthGroups = [

                    { name: "Stochastic Foundations", nodeIds: ['prob', 'rw', 'bm'] },

                    { name: "Continuous Processes", nodeIds: ['drift', 'vol', 'gbm'] },

                    { name: "Advanced Rules", nodeIds: ['mart', 'ito'] },

                    { name: "Transformations", nodeIds: ['transforms', 'log', 'sq'] },

                    { name: "Discontinuous Events", nodeIds: ['jump', 'swan'] }

            ];



            const conceptList = document.querySelector('.concept-list');

            conceptList.innerHTML = ''; // Clear default HTML

            const lockIcon = `<svg class="concept-icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>`;

            const unlockIcon = `<svg class="concept-icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>`;



            growthGroups.forEach((group, i) => {

                    let unlockedCount = group.nodeIds.filter(id => isNodeUnlocked(id)).length;

                    let progress = Math.floor((unlockedCount / group.nodeIds.length) * 100);

                    let isFullyUnlocked = progress === 100;



                    const item = document.createElement('div');

                    item.className = `concept-item ${isFullyUnlocked ? 'unlocked' : ''}`;

                    item.innerHTML = `

                            ${isFullyUnlocked ? unlockIcon : lockIcon}

                            <div class="concept-name">${group.name}</div>

                            <div class="progress-bar"><div class="progress-fill" style="width: 0%; transition: width 1s cubic-bezier(0.1, 0.9, 0.2, 1);"></div></div>

                    `;

                    conceptList.appendChild(item);



                    // Animate progress bars filling up sequentially

                    setTimeout(() => {

                            item.querySelector('.progress-fill').style.width = progress + '%';

                    }, 300 + (i * 150));

         });



        // --- 4. LIVE GBM SIMULATION (Canvas) ---

        const canvas = document.getElementById('gbm-canvas');

        const ctx = canvas.getContext('2d');

        let width, height;



        function resizeCanvas() {

            width = canvas.parentElement.clientWidth;

            height = canvas.parentElement.clientHeight - 25;

            canvas.width = width;

            canvas.height = height;

        }

        window.addEventListener('resize', resizeCanvas);

        resizeCanvas();



        let path = [];

        let s = height / 2; // Initial price

        const mu = 0.001;   // Drift

        const sigma = 0.02; // Volatility

        const dt = 1;       // Time step

        let x = 0;



        // Standard Normal variate using Box-Muller transform

        function randomNormal() {

            let u = 0, v = 0;

            while(u === 0) u = Math.random();

            while(v === 0) v = Math.random();

            return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);

        }



        function drawGBM() {

            // Calculate next step using Geometric Brownian Motion formula

            const dW = randomNormal() * Math.sqrt(dt);

            s = s * Math.exp((mu - 0.5 * sigma * sigma) * dt + sigma * dW);

            

            // Keep it bounded for visual purposes

            if(s > height) s = height * 0.9;

            if(s < 0) s = height * 0.1;



            path.push(s);

            if (path.length > width / 2) path.shift(); // Scroll left



            ctx.clearRect(0, 0, width, height);

            

            // Draw grid

            ctx.strokeStyle = 'rgba(255,255,255,0.05)';

            ctx.lineWidth = 1;

            for(let i=0; i<height; i+=20) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(width, i); ctx.stroke(); }

            for(let i=0; i<width; i+=20) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, height); ctx.stroke(); }



            // Draw path

            ctx.beginPath();

            ctx.moveTo(0, height - path[0]);

            for (let i = 1; i < path.length; i++) {

                ctx.lineTo(i * 2, height - path[i]);

            }

            

            // Glow effect

            ctx.shadowBlur = 10;

            ctx.shadowColor = '#7fff8c';

            ctx.strokeStyle = '#7fff8c';

            ctx.lineWidth = 2;

            ctx.stroke();

            ctx.shadowBlur = 0;



            requestAnimationFrame(drawGBM);

        }

        drawGBM();



    </script>
